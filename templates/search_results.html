{% if titles %}
  <ul class="result-list" role="listbox">
    {% for title in titles %}
      <li class="result-list__item">
        <a class="result-list__link" href="/article/{{ title|urlencode }}">
          {{ title }}
        </a>
      </li>
    {% endfor %}
  </ul>
{% elif q %}
  <p class="no-results">No articles match &ldquo;{{ q }}&rdquo;.</p>
{% endif %}
